<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Family Tasks Pro</title>
    
    <!-- Librerie esterne necessarie -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Outfit:wght@100..900&display=swap');
        
        :root { --safe-top: env(safe-area-inset-top); }
        
        body { 
            margin: 0; padding: 0; overflow: hidden; 
            -webkit-user-select: none; user-select: none;
            background-color: #000;
            height: 100vh;
        }

        /* Classi Font Personalizzate */
        .font-sans { font-family: 'Outfit', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .font-rounded { font-family: 'Space Grotesk', sans-serif; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .active-scale:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Componente per le icone Lucide
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        attrs: { stroke: 'currentColor', 'stroke-width': 2.5, width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            const lucideName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
            return <i ref={iconRef} data-lucide={lucideName} className={className}></i>;
        };

        const PRIORITIES = [
            { id: 'high', label: 'Alta', color: 'bg-red-500', text: 'text-red-500' },
            { id: 'medium', label: 'Media', color: 'bg-amber-500', text: 'text-amber-500' },
            { id: 'low', label: 'Bassa', color: 'bg-emerald-500', text: 'text-emerald-500' },
        ];

        const BACKGROUNDS = [
            { id: 'light', name: 'Minimal', class: 'bg-slate-50 text-slate-900', card: 'bg-white/80 border-slate-200' },
            { id: 'dark', name: 'Night', class: 'bg-slate-950 text-white', card: 'bg-white/10 border-white/10' },
            { id: 'aurora', name: 'Aurora', class: 'bg-gradient-to-br from-emerald-400 to-cyan-500 text-white', card: 'bg-white/20 border-white/20' },
            { id: 'rose', name: 'Rose', class: 'bg-gradient-to-br from-rose-400 to-purple-500 text-white', card: 'bg-white/20 border-white/20' },
            { id: 'ocean', name: 'Ocean', class: 'bg-gradient-to-br from-blue-600 to-indigo-900 text-white', card: 'bg-white/20 border-white/20' }
        ];

        const FONTS = [
            { id: 'font-sans', name: 'Minimal' },
            { id: 'font-serif', name: 'Classic' },
            { id: 'font-mono', name: 'Modern' },
            { id: 'font-rounded', name: 'Playful' }
        ];

        function App() {
            // --- Stato ---
            const [isAuth, setIsAuth] = useState(false);
            const [storedPin, setStoredPin] = useState(() => localStorage.getItem('family_pin') || '1234');
            const [inputPin, setInputPin] = useState('');
            const [tasks, setTasks] = useState(() => JSON.parse(localStorage.getItem('family_tasks') || '[]'));
            const [view, setView] = useState('home'); // home, stats, settings
            const [activeTab, setActiveTab] = useState('todo'); // create, todo, done
            const [theme, setTheme] = useState(BACKGROUNDS[0]);
            const [font, setFont] = useState(FONTS[0]);
            const [sortBy, setSortBy] = useState('date');
            
            const [newTask, setNewTask] = useState('');
            const [newPrio, setNewPrio] = useState('medium');
            const [modal, setModal] = useState({ show: false, type: '', task: null });

            // Cambio PIN
            const [isChangingPin, setIsChangingPin] = useState(false);
            const [changePinStep, setChangePinStep] = useState(1);
            const [tempPinInput, setTempPinInput] = useState('');

            // --- Effects ---
            useEffect(() => { localStorage.setItem('family_tasks', JSON.stringify(tasks)); }, [tasks]);
            useEffect(() => { localStorage.setItem('family_pin', storedPin); }, [storedPin]);

            useEffect(() => {
                if (inputPin.length === 4) {
                    if (inputPin === storedPin) {
                        setTimeout(() => { setIsAuth(true); setInputPin(''); }, 200);
                    } else {
                        setTimeout(() => setInputPin(''), 500);
                    }
                }
            }, [inputPin, storedPin]);

            useEffect(() => {
                if (tempPinInput.length === 4) {
                    if (changePinStep === 1) {
                        if (tempPinInput === storedPin) { setChangePinStep(2); setTempPinInput(''); }
                        else { setTimeout(() => setTempPinInput(''), 500); }
                    } else if (changePinStep === 2) {
                        setStoredPin(tempPinInput);
                        setChangePinStep(3);
                        setTimeout(() => { setIsChangingPin(false); setChangePinStep(1); setTempPinInput(''); }, 1500);
                    }
                }
            }, [tempPinInput]);

            // --- Logic ---
            const addTask = () => {
                if (!newTask.trim()) return;
                const task = { id: Date.now(), text: newTask, prio: newPrio, done: false, date: new Date() };
                setTasks([task, ...tasks]);
                setNewTask('');
                setActiveTab('todo');
            };

            const sortedTasks = useMemo(() => {
                const filtered = tasks.filter(t => activeTab === 'todo' ? !t.done : t.done);
                if (sortBy === 'priority') {
                    const order = { high: 1, medium: 2, low: 3 };
                    return [...filtered].sort((a, b) => order[a.prio] - order[b.prio]);
                }
                return [...filtered].sort((a, b) => b.id - a.id);
            }, [tasks, activeTab, sortBy]);

            const stats = useMemo(() => ({
                total: tasks.length,
                done: tasks.filter(t => t.done).length,
                todo: tasks.filter(t => !t.done).length,
                urgent: tasks.filter(t => t.prio === 'high' && !t.done).length
            }), [tasks]);

            // --- Render Login ---
            if (!isAuth) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-slate-100 p-8 font-sans">
                        <div className="bg-white p-10 rounded-[50px] shadow-2xl w-full max-w-sm text-center fade-in">
                            <div className="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-6">
                                <Icon name="Lock" size={28} className="text-indigo-600" />
                            </div>
                            <h2 className="text-xl font-black mb-8 tracking-tight italic uppercase">Accesso Famiglia</h2>
                            <div className="flex justify-center gap-4 mb-10">
                                {[...Array(4)].map((_, i) => (
                                    <div key={i} className={`w-3 h-3 rounded-full border-2 transition-all ${inputPin.length > i ? 'bg-indigo-600 border-indigo-600 scale-125' : 'border-slate-200'}`} />
                                ))}
                            </div>
                            <div className="grid grid-cols-3 gap-4">
                                {[1, 2, 3, 4, 5, 6, 7, 8, 9, 'C', 0, 'del'].map(n => (
                                    <button key={n} onClick={() => {
                                        if (n === 'C') setInputPin('');
                                        else if (n === 'del') setInputPin(p => p.slice(0, -1));
                                        else if (inputPin.length < 4) setInputPin(p => p + n);
                                    }} className="h-14 w-14 mx-auto rounded-full text-xl font-bold flex items-center justify-center active:bg-slate-100 active:scale-90 transition-all">
                                        {n === 'del' ? '←' : n}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`min-h-screen flex flex-col transition-all duration-500 ${theme.class} ${font.id}`}>
                    {/* Header */}
                    <header className="px-6 pt-16 pb-4 flex justify-between items-end safe-top">
                        <div>
                            <p className="text-[9px] font-black uppercase tracking-[0.3em] opacity-40 mb-1">PROGETTO</p>
                            <h1 className="text-3xl font-black tracking-tighter italic uppercase">Family Hub</h1>
                        </div>
                        <button onClick={() => setView('settings')} className="p-3 rounded-2xl bg-white/20 backdrop-blur-md border border-white/20 active-scale transition-all">
                            <Icon name="Settings" size={22} />
                        </button>
                    </header>

                    {/* Navigation Tabs */}
                    <div className="flex px-6 gap-2 mb-6">
                        {['home', 'stats'].map(v => (
                            <button key={v} onClick={() => setView(v)} className={`flex-1 py-3 rounded-2xl text-[9px] font-black uppercase tracking-widest transition-all ${view === v ? 'bg-white/20 shadow-lg' : 'opacity-30'}`}>
                                {v === 'home' ? 'Task' : 'Dati'}
                            </button>
                        ))}
                    </div>

                    <main className="flex-1 px-6 overflow-y-auto no-scrollbar pb-32">
                        {view === 'home' && (
                            <div className="fade-in">
                                {/* Sub Tabs */}
                                <div className="flex bg-black/5 p-1 rounded-[24px] backdrop-blur-md mb-8">
                                    {['create', 'todo', 'done'].map(t => (
                                        <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-3 text-[9px] font-black uppercase tracking-widest rounded-[18px] transition-all ${activeTab === t ? 'bg-white text-indigo-600 shadow-sm' : 'opacity-30'}`}>
                                            {t === 'create' ? 'Aggiungi' : t === 'todo' ? 'Da fare' : 'Fatti'}
                                        </button>
                                    ))}
                                </div>

                                {activeTab === 'create' ? (
                                    <div className="bg-white rounded-[40px] p-8 shadow-2xl text-slate-900 fade-in">
                                        <textarea value={newTask} onChange={e => setNewTask(e.target.value)} placeholder="Scrivi qui..." className="w-full text-xl font-bold border-none focus:ring-0 p-0 resize-none min-h-[140px] bg-transparent" />
                                        <div className="flex gap-2 mt-4">
                                            {PRIORITIES.map(p => (
                                                <button key={p.id} onClick={() => setNewPrio(p.id)} className={`flex-1 py-3 rounded-xl border-2 transition-all ${newPrio === p.id ? `${p.color} border-transparent text-white` : 'bg-slate-50 border-transparent opacity-30'}`}>
                                                    <span className="text-[8px] font-black uppercase">{p.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                        <button onClick={addTask} disabled={!newTask.trim()} className="w-full mt-6 py-5 bg-indigo-600 text-white rounded-[24px] font-black uppercase tracking-widest text-[10px] shadow-xl active-scale disabled:opacity-20 transition-all">
                                            Salva Task
                                        </button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        <div className="flex justify-end">
                                            <button onClick={() => setSortBy(sortBy === 'date' ? 'priority' : 'date')} className="text-[9px] font-black uppercase tracking-widest opacity-40 flex items-center gap-2">
                                                <Icon name="ArrowUpDown" size={12} /> {sortBy === 'date' ? 'Per Data' : 'Per Priorità'}
                                            </button>
                                        </div>
                                        {sortedTasks.map(t => (
                                            <div key={t.id} className={`${theme.card} backdrop-blur-xl border p-5 rounded-[30px] flex items-center gap-4 fade-in`}>
                                                <button onClick={() => setTasks(tasks.map(x => x.id === t.id ? {...x, done: !x.done} : x))} className={t.done ? 'text-green-400' : 'opacity-20'}>
                                                    <Icon name={t.done ? "CheckCircle2" : "Circle"} size={26} />
                                                </button>
                                                <div className="flex-1">
                                                    <p className={`font-bold text-lg leading-tight ${t.done ? 'line-through opacity-30' : ''}`}>{t.text}</p>
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <div className={`w-1.5 h-1.5 rounded-full ${PRIORITIES.find(p => p.id === t.prio).color}`} />
                                                        <span className="text-[8px] font-black uppercase opacity-30 tracking-widest">{PRIORITIES.find(p => p.id === t.prio).label}</span>
                                                    </div>
                                                </div>
                                                <button onClick={() => setModal({show: true, type: 'delete', task: t})} className="opacity-10 p-2">
                                                    <Icon name="Trash2" size={18} />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'stats' && (
                            <div className="fade-in space-y-4">
                                <div className="bg-white/20 backdrop-blur-xl p-8 rounded-[45px] border border-white/10 shadow-xl">
                                    <h4 className="font-black text-[10px] uppercase tracking-[0.3em] mb-8 text-center opacity-50 italic">Report Settimanale</h4>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="text-center bg-black/5 p-5 rounded-3xl"><p className="text-[9px] font-black opacity-40 uppercase mb-1">Completati</p><h4 className="text-4xl font-black italic">{stats.done}</h4></div>
                                        <div className="text-center bg-black/5 p-5 rounded-3xl"><p className="text-[9px] font-black opacity-40 uppercase mb-1">Da fare</p><h4 className="text-4xl font-black italic">{stats.todo}</h4></div>
                                    </div>
                                </div>
                                <div className="bg-indigo-600 p-8 rounded-[45px] text-white shadow-2xl">
                                    <h4 className="font-black text-xl mb-1 italic uppercase tracking-tighter">Attenzione</h4>
                                    <p className="text-xs opacity-70 mb-6">Ci sono {stats.urgent} task urgenti che aspettano te.</p>
                                    <button onClick={() => { setView('home'); setActiveTab('todo'); setSortBy('priority'); }} className="w-full py-4 bg-white text-indigo-950 rounded-[22px] font-black uppercase text-[10px] tracking-[0.3em]">Gestisci</button>
                                </div>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="fade-in space-y-8">
                                <section>
                                    <h3 className="text-[10px] font-black uppercase tracking-widest opacity-40 mb-4">Temi Visivi</h3>
                                    <div className="grid grid-cols-2 gap-3">
                                        {BACKGROUNDS.map(t => (
                                            <button key={t.id} onClick={() => setTheme(t)} className={`p-5 rounded-[28px] text-left border-2 transition-all ${theme.id === t.id ? 'border-white bg-white/20' : 'border-transparent bg-black/5 opacity-40'}`}>
                                                <span className="text-[9px] font-black uppercase">{t.name}</span>
                                            </button>
                                        ))}
                                    </div>
                                </section>

                                <section>
                                    <h3 className="text-[10px] font-black uppercase tracking-widest opacity-40 mb-4">Stile Testo</h3>
                                    <div className="grid grid-cols-2 gap-3">
                                        {FONTS.map(f => (
                                            <button key={f.id} onClick={() => setFont(f)} className={`p-5 rounded-[28px] text-left border-2 transition-all ${f.id} ${font.id === f.id ? 'border-white bg-white/20' : 'border-transparent bg-black/5 opacity-40'}`}>
                                                <span className="text-[9px] font-black uppercase">{f.name}</span>
                                            </button>
                                        ))}
                                    </div>
                                </section>

                                <section>
                                    <h3 className="text-[10px] font-black uppercase tracking-widest opacity-40 mb-4">Privacy</h3>
                                    <button onClick={() => setIsChangingPin(true)} className="w-full p-6 bg-black/5 rounded-[30px] flex justify-between items-center active-scale transition-all">
                                        <div className="text-left">
                                            <p className="text-[10px] font-black uppercase tracking-widest">Cambia PIN Segreto</p>
                                            <p className="text-[8px] opacity-30 mt-1 uppercase">Attuale: ****</p>
                                        </div>
                                        <Icon name="KeyRound" size={20} className="opacity-30" />
                                    </button>
                                </section>

                                <button onClick={() => setIsAuth(false)} className="w-full py-4 bg-red-500/20 text-red-400 rounded-2xl font-black uppercase text-[9px] tracking-widest">Chiudi Sessione</button>
                            </div>
                        )}
                    </main>

                    {/* Footer Nav */}
                    <nav className="fixed bottom-0 left-0 right-0 h-24 bg-white/80 backdrop-blur-3xl border-t border-white/10 flex items-center justify-around px-8 pb-6 z-50">
                        <button onClick={() => setView('home')} className={`p-4 ${view === 'home' ? 'text-indigo-600 scale-125' : 'text-slate-400 opacity-30'}`}>
                            <Icon name="Home" size={24} />
                        </button>
                        <button onClick={() => {setView('home'); setActiveTab('create');}} className="w-14 h-14 bg-indigo-600 text-white rounded-[20px] shadow-2xl flex items-center justify-center -mt-10 active-scale transition-all border-4 border-white">
                            <Icon name="Plus" size={28} />
                        </button>
                        <button onClick={() => setView('stats')} className={`p-4 ${view === 'stats' ? 'text-indigo-600 scale-125' : 'text-slate-400 opacity-30'}`}>
                            <Icon name="BarChart3" size={24} />
                        </button>
                    </nav>

                    {/* Modal Cambio PIN */}
                    {isChangingPin && (
                        <div className="fixed inset-0 z-[200] flex items-end sm:items-center justify-center p-6 fade-in">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={() => {setIsChangingPin(false); setChangePinStep(1); setTempPinInput('');}} />
                            <div className="bg-white w-full max-w-sm rounded-[50px] p-10 relative text-center text-slate-900 shadow-2xl animate-in slide-in-from-bottom-20 duration-500">
                                <div className="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <Icon name={changePinStep === 3 ? "ShieldCheck" : "KeyRound"} size={28} className="text-indigo-600" />
                                </div>
                                <h3 className="text-xl font-black uppercase italic mb-2">
                                    {changePinStep === 1 ? 'PIN Attuale' : changePinStep === 2 ? 'Nuovo PIN' : 'Cambiato!'}
                                </h3>
                                <div className="flex justify-center gap-4 my-8">
                                    {[...Array(4)].map((_, i) => (
                                        <div key={i} className={`w-3 h-3 rounded-full border-2 transition-all ${tempPinInput.length > i ? 'bg-indigo-600 border-indigo-600 scale-125' : 'border-slate-200'}`} />
                                    ))}
                                </div>
                                {changePinStep < 3 && (
                                    <div className="grid grid-cols-3 gap-4">
                                        {[1, 2, 3, 4, 5, 6, 7, 8, 9, 'X', 0, 'del'].map(n => (
                                            <button key={n} onClick={() => {
                                                if (n === 'X') {setIsChangingPin(false); setChangePinStep(1); setTempPinInput('');}
                                                else if (n === 'del') setTempPinInput(p => p.slice(0, -1));
                                                else if (tempPinInput.length < 4) setTempPinInput(p => p + n);
                                            }} className="h-12 w-12 mx-auto rounded-full text-lg font-bold flex items-center justify-center active:bg-slate-100 transition-all">
                                                {n === 'del' ? '←' : n}
                                            </button>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* Modal Azioni Task */}
                    {modal.show && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 fade-in">
                            <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={() => setModal({show: false, type: '', task: null})} />
                            <div className="bg-white w-full max-w-xs rounded-[40px] p-8 relative text-center text-slate-900 shadow-2xl">
                                <h3 className="text-xl font-black uppercase italic mb-6">Eliminare?</h3>
                                <button onClick={() => {setTasks(tasks.filter(x => x.id !== modal.task.id)); setModal({show: false, type: '', task: null});}} className="w-full py-4 bg-red-500 text-white rounded-2xl font-black uppercase text-[9px] tracking-widest mb-2">Conferma</button>
                                <button onClick={() => setModal({show: false, type: '', task: null})} className="w-full py-4 bg-slate-50 text-slate-400 rounded-2xl font-black uppercase text-[9px] tracking-widest">Annulla</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
