<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Family Tasks Pro</title>
    
    <!-- Script necessari (versioni stabili) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="manifest" href="manifest.json">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Outfit:wght@100..900&display=swap');
        
        :root { --ion-safe-area-top: env(safe-area-inset-top); }
        
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            -webkit-user-select: none; 
            user-select: none;
            background-color: #000;
        }

        .font-sans { font-family: 'Outfit', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .font-rounded { font-family: 'Space Grotesk', sans-serif; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        * { -webkit-tap-highlight-color: transparent; outline: none; }
        
        .safe-top { padding-top: var(--ion-safe-area-top); }
        
        /* Animazioni */
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Componente Icona Sicuro per PWA
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        icons: { [name]: window.lucide.icons[name] },
                        attrs: { stroke: 'currentColor', 'stroke-width': 2.5, width: size, height: size, class: className }
                    });
                }
            }, [name, size, className]);
            const lucideName = name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').toLowerCase();
            return <i ref={iconRef} data-lucide={lucideName} className={className}></i>;
        };

        const PRIORITIES = [
            { id: 'high', label: 'Alta', color: 'bg-red-500', text: 'text-red-500' },
            { id: 'medium', label: 'Media', color: 'bg-amber-500', text: 'text-amber-500' },
            { id: 'low', label: 'Bassa', color: 'bg-emerald-500', text: 'text-emerald-500' },
        ];

        const THEMES = [
            { id: 'light', name: 'Minimal', class: 'bg-slate-50 text-slate-900', card: 'bg-white/80 border-slate-200' },
            { id: 'dark', name: 'Night', class: 'bg-slate-950 text-white', card: 'bg-white/10 border-white/10' },
            { id: 'aurora', name: 'Aurora', class: 'bg-gradient-to-br from-emerald-400 to-cyan-500 text-white', card: 'bg-white/20 border-white/20' },
            { id: 'rose', name: 'Rose', class: 'bg-gradient-to-br from-rose-400 to-purple-500 text-white', card: 'bg-white/20 border-white/20' }
        ];

        function App() {
            const [isAuth, setIsAuth] = useState(false);
            const [pin, setPin] = useState('');
            const [tasks, setTasks] = useState([]);
            const [view, setView] = useState('home');
            const [activeTab, setActiveTab] = useState('todo');
            const [theme, setTheme] = useState(THEMES[0]);
            const [newTask, setNewTask] = useState('');
            const [newPrio, setNewPrio] = useState('medium');
            const [modal, setModal] = useState({ show: false, task: null });

            const SECRET_PIN = '1234';

            useEffect(() => {
                if (pin.length === 4) {
                    if (pin === SECRET_PIN) {
                        setTimeout(() => setIsAuth(true), 200);
                    } else {
                        setTimeout(() => setPin(''), 400);
                    }
                }
            }, [pin]);

            const addTask = () => {
                if (!newTask.trim()) return;
                const task = { id: Date.now(), text: newTask, prio: newPrio, done: false, date: new Date() };
                setTasks([task, ...tasks]);
                setNewTask('');
                setActiveTab('todo');
            };

            const stats = useMemo(() => ({
                total: tasks.length,
                done: tasks.filter(t => t.done).length,
                pending: tasks.filter(t => !t.done).length,
                urgent: tasks.filter(t => t.prio === 'high' && !t.done).length
            }), [tasks]);

            if (!isAuth) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen bg-slate-100 p-8 font-sans">
                        <div className="bg-white p-10 rounded-[50px] shadow-2xl w-full max-w-sm text-center fade-in">
                            <div className="w-20 h-20 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-8">
                                <Icon name="Lock" size={32} className="text-indigo-600" />
                            </div>
                            <h2 className="text-2xl font-black mb-10 tracking-tight italic">SECURITY</h2>
                            <div className="flex justify-center gap-5 mb-12">
                                {[...Array(4)].map((_, i) => (
                                    <div key={i} className={`w-4 h-4 rounded-full border-2 transition-all ${pin.length > i ? 'bg-indigo-600 border-indigo-600 scale-125' : 'border-slate-200'}`} />
                                ))}
                            </div>
                            <div className="grid grid-cols-3 gap-6">
                                {[1, 2, 3, 4, 5, 6, 7, 8, 9, 'C', 0, '←'].map(n => (
                                    <button key={n} onClick={() => {
                                        if (n === 'C') setPin('');
                                        else if (n === '←') setPin(p => p.slice(0, -1));
                                        else if (pin.length < 4) setPin(p => p + n);
                                    }} className="h-16 w-16 mx-auto rounded-full text-2xl font-bold flex items-center justify-center active:bg-slate-100 active:scale-90 transition-all">
                                        {n}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className={`min-h-screen flex flex-col transition-all duration-500 ${theme.class} font-sans`}>
                    <header className="px-6 pt-16 pb-6 flex justify-between items-end safe-top">
                        <div>
                            <p className="text-[10px] font-black uppercase tracking-[0.3em] opacity-50 mb-1">
                                {new Date().toLocaleDateString('it-IT', { weekday: 'long', day: 'numeric', month: 'short' })}
                            </p>
                            <h1 className="text-4xl font-black tracking-tighter italic uppercase">Tasks</h1>
                        </div>
                        <button onClick={() => setView('settings')} className="p-4 rounded-3xl bg-white/20 backdrop-blur-md border border-white/20 active:scale-90 transition-all">
                            <Icon name="Settings" size={24} />
                        </button>
                    </header>

                    <main className="flex-1 px-6 overflow-y-auto no-scrollbar pb-32">
                        {view === 'home' && (
                            <div className="fade-in">
                                <div className="flex bg-black/5 p-1.5 rounded-[28px] backdrop-blur-md mb-8">
                                    {['create', 'todo', 'done'].map(t => (
                                        <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-3 text-[10px] font-black uppercase tracking-widest rounded-[22px] transition-all ${activeTab === t ? 'bg-white text-indigo-600 shadow-xl' : 'opacity-40'}`}>
                                            {t === 'create' ? 'Nuovo' : t === 'todo' ? 'Lista' : 'Fatti'}
                                        </button>
                                    ))}
                                </div>

                                {activeTab === 'create' && (
                                    <div className="bg-white rounded-[45px] p-8 shadow-2xl text-slate-900">
                                        <textarea 
                                            value={newTask} 
                                            onChange={e => setNewTask(e.target.value)}
                                            placeholder="Cosa vuoi fare?" 
                                            className="w-full text-2xl font-bold border-none focus:ring-0 p-0 resize-none min-h-[150px] bg-transparent"
                                        />
                                        <div className="flex gap-2 mt-6">
                                            {PRIORITIES.map(p => (
                                                <button key={p.id} onClick={() => setNewPrio(p.id)} className={`flex-1 py-4 rounded-2xl border-2 transition-all ${newPrio === p.id ? `${p.color} border-transparent text-white` : 'bg-slate-50 border-transparent opacity-40'}`}>
                                                    <span className="text-[9px] font-black uppercase">{p.label}</span>
                                                </button>
                                            ))}
                                        </div>
                                        <button onClick={addTask} disabled={!newTask.trim()} className="w-full mt-8 py-6 bg-indigo-600 text-white rounded-[30px] font-black uppercase tracking-widest text-xs shadow-xl active:scale-95 disabled:opacity-20 transition-all">
                                            Salva Task
                                        </button>
                                    </div>
                                )}

                                {(activeTab === 'todo' || activeTab === 'done') && (
                                    <div className="space-y-4">
                                        {tasks.filter(t => activeTab === 'todo' ? !t.done : t.done).map(t => (
                                            <div key={t.id} className={`${theme.card} backdrop-blur-xl border p-5 rounded-[35px] flex items-center gap-4 shadow-sm fade-in`}>
                                                <button onClick={() => setTasks(tasks.map(x => x.id === t.id ? {...x, done: !x.done} : x))} className={t.done ? 'text-green-400' : 'opacity-30'}>
                                                    <Icon name={t.done ? "CheckCircle2" : "Circle"} size={28} />
                                                </button>
                                                <div className="flex-1">
                                                    <p className={`text-lg font-bold leading-tight ${t.done ? 'line-through opacity-40' : ''}`}>{t.text}</p>
                                                    <div className="flex items-center gap-2 mt-1">
                                                        <div className={`w-2 h-2 rounded-full ${PRIORITIES.find(p => p.id === t.prio).color}`} />
                                                        <span className="text-[9px] font-black uppercase opacity-40">{PRIORITIES.find(p => p.id === t.prio).label}</span>
                                                    </div>
                                                </div>
                                                <button onClick={() => setModal({show: true, task: t})} className="opacity-20 hover:text-red-500 p-2">
                                                    <Icon name="Trash2" size={20} />
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'stats' && (
                            <div className="fade-in space-y-6">
                                <div className="bg-white/10 backdrop-blur-xl p-8 rounded-[45px] border border-white/20 text-center">
                                    <h3 className="text-[10px] font-black uppercase tracking-widest opacity-50 mb-8">Performance</h3>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-black/10 p-6 rounded-[35px]">
                                            <p className="text-[9px] font-black uppercase opacity-40 mb-1">Fatti</p>
                                            <h4 className="text-5xl font-black italic">{stats.done}</h4>
                                        </div>
                                        <div className="bg-black/10 p-6 rounded-[35px]">
                                            <p className="text-[9px] font-black uppercase opacity-40 mb-1">Rimasti</p>
                                            <h4 className="text-5xl font-black italic">{stats.pending}</h4>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'settings' && (
                            <div className="fade-in space-y-8">
                                <section>
                                    <h3 className="text-[10px] font-black uppercase tracking-widest opacity-40 mb-4 px-2">Temi</h3>
                                    <div className="grid grid-cols-2 gap-4">
                                        {THEMES.map(t => (
                                            <button key={t.id} onClick={() => setTheme(t)} className={`p-6 rounded-[35px] text-left border-2 transition-all ${theme.id === t.id ? 'border-white bg-white/20' : 'border-transparent bg-black/5 opacity-50'}`}>
                                                <span className="text-[10px] font-black uppercase">{t.name}</span>
                                            </button>
                                        ))}
                                    </div>
                                </section>
                                <button onClick={() => setIsAuth(false)} className="w-full py-4 bg-red-500/20 text-red-400 rounded-2xl font-black uppercase text-[10px] tracking-widest">Esci</button>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 h-24 bg-white/80 backdrop-blur-3xl border-t border-white/10 flex items-center justify-around px-10 pb-6 z-50">
                        <button onClick={() => setView('home')} className={`p-4 transition-all ${view === 'home' ? 'text-indigo-600 scale-125' : 'text-slate-400 opacity-40'}`}>
                            <Icon name="Home" size={28} />
                        </button>
                        <button onClick={() => {setView('home'); setActiveTab('create');}} className="w-16 h-16 bg-indigo-600 text-white rounded-[24px] shadow-2xl flex items-center justify-center -mt-12 active:scale-90 transition-all border-4 border-white">
                            <Icon name="Plus" size={32} />
                        </button>
                        <button onClick={() => setView('stats')} className={`p-4 transition-all ${view === 'stats' ? 'text-indigo-600 scale-125' : 'text-slate-400 opacity-40'}`}>
                            <Icon name="BarChart3" size={28} />
                        </button>
                    </nav>

                    {modal.show && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 fade-in">
                            <div className="absolute inset-0 bg-black/80 backdrop-blur-md" onClick={() => setModal({show: false, task: null})} />
                            <div className="bg-white w-full max-w-xs rounded-[50px] p-10 relative text-center text-slate-900 shadow-2xl">
                                <h3 className="text-2xl font-black uppercase italic mb-2">Elimina?</h3>
                                <button onClick={() => {setTasks(tasks.filter(x => x.id !== modal.task.id)); setModal({show: false, task: null});}} className="w-full py-5 bg-red-500 text-white rounded-[25px] font-black uppercase text-[10px] tracking-widest mb-3">Sì, Elimina</button>
                                <button onClick={() => setModal({show: false, task: null})} className="w-full py-5 bg-slate-50 text-slate-400 rounded-[25px] font-black uppercase text-[10px] tracking-widest">Annulla</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
